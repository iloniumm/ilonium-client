name: Release CI/CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            cmake \
            python3 \
            pkg-config \
            libxml2-dev \
            libcurl4-openssl-dev \
            libpng-dev \
            libmimalloc-dev \
            libzthread-dev \
            recode \
            desktop-file-utils \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libdbus-1-dev \
            libibus-1.0-dev \
            libxtst-dev

      - name: Build SDL3 from source
        run: |
          # Build SDL3
          git clone --depth 1 https://github.com/libsdl-org/SDL.git -b main
          cd SDL
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DSDL_STATIC=OFF -DSDL_SHARED=ON -DSDL_X11_XTEST=OFF
          cmake --build build -j$(nproc)
          sudo cmake --install build
          cd ..
          
          # Build SDL3_image
          git clone --depth 1 https://github.com/libsdl-org/SDL_image.git -b main
          cd SDL_image
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DSDLIMAGE_SAMPLES=OFF -DSDLIMAGE_DEPS_SHARED=ON
          cmake --build build -j$(nproc)
          sudo cmake --install build
          cd ..
          
          # Build SDL3_mixer
          git clone --depth 1 https://github.com/libsdl-org/SDL_mixer.git -b main
          cd SDL_mixer
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DSDLMIXER_SAMPLES=OFF -DSDLMIXER_DEPS_SHARED=ON
          cmake --build build -j$(nproc)
          sudo cmake --install build
          cd ..

      - name: Build
        run: |
          ./bootstrap.sh
          ./configure --prefix=/usr --bindir=/usr/bin progname=Retrocycles progtitle="Retrocycles"
          make -j$(nproc)

      - name: Package
        run: |
          make install DESTDIR=$(pwd)/appdir
          cd docker/build/context
          APPDIR=$(pwd)/../../../appdir PACKAGE=Retrocycles bash portable/build
          cd ../../..
          
          # Download and run appimagetool to create the AppImage
          curl -LO https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # Set up DirIcon
          find appdir -name "*.png" -path "*/icons/*48x48*" -exec cp {} appdir/.DirIcon \; || true
          
          # Pack appdir into AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract-and-run --no-appstream appdir Retrocycles-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retrocycles-Linux-AppImage
          path: Retrocycles-x86_64.AppImage

  build-windows:
    name: Build Windows (MinGW)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-sdl3
            mingw-w64-x86_64-sdl3-image
            mingw-w64-x86_64-sdl3-mixer
            mingw-w64-x86_64-mimalloc
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-recode
            git

      - name: Build
        shell: msys2 {0}
        run: |
          ./bootstrap.sh
          ./configure --prefix=/mingw64 --disable-sysinstall --disable-desktop --disable-armathentication progname=Retrocycles progtitle="Retrocycles"
          make -j4

      - name: Package
        shell: msys2 {0}
        run: |
          # Clone Code::Blocks template repository
          git clone https://gitlab.com/armagetronad/build_codeblocks.git docker/build/context/codeblocks
          
          # Create temporary directories for winsource.sh script execution
          mkdir -p docker/build/context/source
          mkdir -p docker/build/context/build
          
          # Copy source tree and compile assets
          cp -r Makefile configure bootstrap.sh config.h.in version.m4 aclocal.m4 configure.ac Makefile.am Makefile.in batch desktop language models resource scripts sound textures AUTHORS CHANGELOG.md COPYING NEWS news README.md INSTALL ChangeLog src docker/build/context/source/ || true
          cp -r language docker/build/context/build/
          cp -r config docker/build/context/build/
          mkdir -p docker/build/context/build/src/doc
          cp -r src/doc/* docker/build/context/build/src/doc/ || true
          
          # Execute winsource.sh script
          cd docker/build/context
          bash winsource.sh
          cd ../../..
          
          # Copy executable and supporting DLLs into winsource package
          cp src/armagetronad_main.exe docker/build/context/winsource/Retrocycles.exe
          cp /mingw64/bin/SDL3.dll docker/build/context/winsource/
          cp /mingw64/bin/*mimalloc*.dll docker/build/context/winsource/ || true
          cp /mingw64/bin/SDL3_image.dll docker/build/context/winsource/ || true
          cp /mingw64/bin/SDL3_mixer.dll docker/build/context/winsource/ || true
          cp /mingw64/bin/libxml2.dll docker/build/context/winsource/ || true
          cp /mingw64/bin/libpng*.dll docker/build/context/winsource/ || true
          cp /mingw64/bin/libcurl*.dll docker/build/context/winsource/ || true

          # Find and copy all dependent MinGW DLLs recursively
          echo "Copying recursive MinGW DLL dependencies..."
          mkdir -p temp_dlls
          cp docker/build/context/winsource/*.dll docker/build/context/winsource/Retrocycles.exe temp_dlls/
          for i in {1..3}; do
            for f in temp_dlls/*.dll temp_dlls/*.exe; do
              ldd "$f" | grep -i "/mingw64/bin/" | awk '{print $3}' | while read -r dll_path; do
                if [ -f "$dll_path" ]; then
                  dll_name=$(basename "$dll_path")
                  if [ ! -f "docker/build/context/winsource/$dll_name" ]; then
                    echo "Copying dependency: $dll_name"
                    cp "$dll_path" docker/build/context/winsource/
                    cp "$dll_path" temp_dlls/
                  fi
                fi
              done
            done
          done
          rm -rf temp_dlls

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retrocycles-Windows-MinGW
          path: docker/build/context/winsource

  build-macos:
    name: Build macOS (.app Bundle)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install autoconf automake libtool dylibbundler sdl3 sdl3_image sdl3_mixer mimalloc pkg-config libpng libxml2 curl

      - name: Setup library symlinks for Apple Silicon
        run: |
          if [ -d /opt/homebrew ]; then
            sudo mkdir -p /usr/local/lib
            sudo ln -s /opt/homebrew/lib/libSDL3*.dylib /usr/local/lib/ || true
            sudo ln -s /opt/homebrew/lib/libmimalloc*.dylib /usr/local/lib/ || true
            sudo mkdir -p /usr/local/opt/sdl3/lib
            sudo ln -s /opt/homebrew/lib/libSDL3*.dylib /usr/local/opt/sdl3/lib/ || true
            sudo mkdir -p /usr/local/opt/mimalloc/lib
            sudo ln -s /opt/homebrew/lib/libmimalloc*.dylib /usr/local/opt/mimalloc/lib/ || true
          fi

      - name: Build
        run: |
          ./bootstrap.sh
          ./configure --disable-restoreold --enable-automakedefaults --disable-useradd --disable-sysinstall --disable-initscripts --disable-uninstall --disable-etc --disable-games progname=Retrocycles progtitle="Retrocycles"
          make -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          export SKIP_PART_2=yes
          bash src/macosx/build_bundle.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Retrocycles-macOS-Bundle
          path: Retrocycles.app

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Retrocycles-Linux-AppImage
          path: artifacts/linux

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Retrocycles-Windows-MinGW
          path: artifacts/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: Retrocycles-macOS-Bundle
          path: artifacts/macos

      - name: Zip Artifacts for Release
        run: |
          cd artifacts/linux && zip -r ../../Retrocycles-Linux-AppImage.zip . && cd ../..
          cd artifacts/windows && zip -r ../../Retrocycles-Windows-MinGW.zip . && cd ../..
          cd artifacts/macos && zip -r ../../Retrocycles-macOS-Bundle.zip . && cd ../..

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Retrocycles-Linux-AppImage.zip
            Retrocycles-Windows-MinGW.zip
            Retrocycles-macOS-Bundle.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
